name: "super_projects"

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        DEVELOPER_UID: ${DEVELOPER_UID:-501}
        DOCKER_GID: ${DOCKER_GID:-1}
    pull_policy: never
    volumes:
      - ../:/workspaces:cached
      # Reuse host Docker daemon (achieves similar effect to devcontainer feature "docker-outside-of-docker")
      - /var/run/docker.sock:/var/run/docker.sock
      # Gemini CLI: .devcontainer/gemini-data -> ~/.gemini (persists across rebuilds)
      - ./gemini-data:/home/developer/.gemini
      # Chrome profile: named volume so Docker initialises it from the image
      # (a bind-mount would create the parent dir as root, crashing Chrome).
      # Data survives container stop/start and is only lost on `docker volume rm`.
      - chrome-devtools-mcp-profile:/home/developer/chrome-profile
      # mise tool cache: persists downloaded archives and compiled/pre-built installs
      # across rebuilds so `mise install` only re-runs for new/changed tool versions.
      # Lost only on `docker volume rm super_projects_mise-data`.
      - mise-data:/home/developer/.local/share/mise
      # SSH keys: bind-mounted from host home directory for continuity with non-devcontainer shells
      # Note: this increases the risk of SSH key exposure such as in the case the container is compromised.
      - ${HOME}/.ssh:/home/developer/.ssh:cached
      # Bash history: mounts from host home directory for continuity with non-devcontainer shells
      - ${HOME}/.bash_history:/home/developer/.bash_history
    # start-vnc + mise install run here (not in the Dockerfile) so image builds stay
    # fast and tool installs persist in the mise-data volume across rebuilds.
    # Works with plain `docker compose up` and with Cursor/VS Code devcontainers.
    command: bash -c "start-vnc && cd /workspaces && mise install && exec tail -f /dev/null"
    hostname: super_projects
    user: developer
    ports:
      - "6080:6080"   # noVNC  — browser GUI for VNC
      # - "5900:5900" # VNC raw port (optional, for native VNC clients)
      - "9223:9223"   # Chrome remote debugging — host-side npx chrome-devtools-mcp connects here
    # Use host network mode to allow the devcontainer to access the host's network
    # This allows services started from within the devcontainer to be accessible from the host machine via localhost, simplifying local development.
    # network_mode: host
    # Chrome requires more shared memory than Docker's default 64 MB
    shm_size: '2gb'
    # Sometimes you may want to avoid using host for security reasons or due to port conflicts with the host machine.
    # To disable this, create a new network and use that network mode instead.
    # Note: in this case you will need to forward ports from the devcontainer to the host machine for services to be accessible.
    networks:
      - super_projects_default

volumes:
  # Chrome profile data: logins, cookies, extensions, history.
  # Survives container stop/start and rebuilds; lost only on `docker volume rm super_projects_chrome-devtools-mcp-profile`.
  chrome-devtools-mcp-profile: {}
  # mise downloads and installs (~/.local/share/mise).
  # Survives rebuilds so tool versions don't need to be re-downloaded or recompiled.
  # Lost only on `docker volume rm super_projects_mise-data`.
  mise-data: {}

networks:
  super_projects_default:
    external: false
    name: super_projects_default